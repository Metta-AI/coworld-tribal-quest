function readU16(bytes,offset){return bytes[offset]|(bytes[offset+1]<<8)}

function readU32(bytes,offset){return (bytes[offset]|(bytes[offset+1]<<8)|(bytes[offset+2]<<16)|(bytes[offset+3]<<24))>>>0}

function rawSprite(bytes,offset,width,height){

function viewport(layerId,width,height){

function putPixel(layer,x0,y0,sprite,srcOffset){
  if(x0<0||y0<0||x0>=layer.width||y0>=layer.height)return;
  const a=sprite.pixels[srcOffset+3];
  if(a===0)return;
  const offset=(y0*layer.width+x0)*4,d=layer.image.data;

  d[offset]=Math.round((sprite.pixels[srcOffset]*sa+d[offset]*dw)/oa);
  d[offset+1]=Math.round((sprite.pixels[srcOffset+1]*sa+d[offset+1]*dw)/oa);
  d[offset+2]=Math.round((sprite.pixels[srcOffset+2]*sa+d[offset+2]*dw)/oa);
  d[offset+3]=Math.round(oa*255)
}
function drawSprite(){
  x.clearRect(0,0,c.width,c.height);
  x.fillStyle="#000";x.fillRect(0,0,c.width,c.height);

    const ordered=[...objects.values()].filter(o=>o.layer===layer.id).sort((a,b)=>a.z-b.z||a.y-b.y||a.id-b.id);
    for(const object of ordered){
      const sprite=sprites.get(object.spriteId);

    }
    layer.ctx.putImageData(layer.image,0,0);
    x.drawImage(layer.canvas,0,0)

function parseSprite(bytes){
  if(!spriteMode){spriteMode=true;l=255}
  let offset=0;
  while(offset<bytes.length){
    const type=bytes[offset++];

      const id=readU16(bytes,offset),ox=readI16(bytes,offset+2),oy=readI16(bytes,offset+4),z=readI16(bytes,offset+6),layer=bytes[offset+8],spriteId=readU16(bytes,offset+9);

    else if(type===0x04){objects.clear()}
